<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>그뭐냐 스튜디오</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard/dist/web/static/pretendard.css">
  <link rel="stylesheet" href="editor.css">
</head>
<body>

  <header>
    <div class="brand">그뭐냐 스튜디오 <span class="brand-sub">온라인 편집기</span></div>
    <div class="controls">
      <select id="example-select" title="예제 불러오기">
        <option value="">📂 예제…</option>
        <option value="sum">두 수의 합</option>
        <option value="fib">피보나치</option>
        <option value="sort">버블 정렬</option>
        <option value="echo">유니코드 에코</option>
      </select>
      <button id="btn-mode" class="primary">⚙️ 실행 모드</button>
      <button id="btn-step" style="display:none;">➡ 단계</button>
      <button id="btn-run">▶ 실행</button>
      <button id="btn-stop" class="danger" style="display:none;">⏹ 중지</button>
      <button id="btn-reset">↺ 초기화</button>
    </div>
  </header>

  <div class="main">
    <div id="code-container">
      <div id="gutter"></div>
      <div id="code-inner">
        <textarea id="editor" spellcheck="false" autocomplete="off" autocorrect="off" autocapitalize="off"></textarea>
        <div id="highlight-view" aria-hidden="true"></div>
        <div id="debug-view" aria-hidden="true"></div>
      </div>
    </div>

    <div id="sidebar">
      <div class="panel" id="console-panel">
        <div class="panel-head">콘솔 <kbd>Ctrl+Enter</kbd></div>
        <div id="console"><div class="c-dim"># 준비 완료</div></div>
      </div>

      <div class="panel" id="input-panel">
        <div class="panel-head">STDIN <span class="hint">— 실행 전에 한 번에 입력</span></div>
        <textarea id="stdin" spellcheck="false" placeholder="입력값을 여기에 미리 써두세요  예) 3 5"></textarea>
        <div id="stdin-status"></div>
      </div>

      <div class="panel" id="memory-panel">
        <div class="panel-head">메모리</div>
        <div id="mem-content"><div class="c-dim">(비어 있음)</div></div>
      </div>
    </div>
  </div>

  <div class="status-bar">
    <span id="status-text">편집 중</span>
    <span id="step-info">스텝 0</span>
    <span class="copy">ⓒ lambda Studios 2026</span>
  </div>

  <script src="editor.js"></script>
</body>
</html>
